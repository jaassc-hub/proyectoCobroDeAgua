{% load static %}
{% load crispy_forms_tags %}

{% block content %}
<div class="informacionCobro mt-2">
    <form hx-post="{% url 'pegues:delete' pegue.id %}" hx-swap="outerHTML">
        {% csrf_token %}
        <div class="alert alert-danger">
            ¿Estás seguro de que deseas el pegue <strong>{{ pegue.codigo_pegue }}</strong> que pertenece a <strong>{{ pegue.abonado.nombre }}</strong> ?
            Esta acción no se puede deshacer.
        </div>

        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancelar</button>
            <button type="submit" class="btn btn-danger">Eliminar </button>
        </div>
    </form>
</div>
{% endblock %}
